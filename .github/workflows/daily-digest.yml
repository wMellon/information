name: Daily AI+Medical Digest

on:
  schedule:
    - cron: '0 0 * * *'   # 08:00 Beijing Time (UTC+8)
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        run: python digest.py

      - name: Commit and push
        run: |
          git config user.name "Daily Digest Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --staged --quiet; then
            echo "No new content to commit."
          else
            git commit -m "chore: daily AI+medical digest $(date +'%Y-%m-%d')"
            git push
          fi
